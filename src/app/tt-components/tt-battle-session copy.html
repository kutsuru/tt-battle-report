<h1>Battle Session</h1>


<div *ngFor="let mob of battle_data() | keyvalue">
@for (mob of battle_data() | keyvalue, track mob) {
    <tt-battle-card-info
        [mob_id]="1002"
        [mob_name]="mob.key"
        [damage_dealers]="mob.value.damage_dealers"
        [damage_received]="mob.value.damage_received"></tt-battle-card-info>
} @empty {
    <li>No RRF Loaded</li>
} 
</div>
