<mat-dialog-actions>
  <button mat-icon-button class="close-button" [mat-dialog-close]="true">
    <mat-icon class="close-icon" color="warn">close</mat-icon>
  </button>
</mat-dialog-actions>


<h1 mat-dialog-title>Battle Details - {{ mob_name }}<h1>
<mat-dialog-content fxLayout="column">
  <div *ngFor="let player of damage_dealers | keyvalue">
    <mat-grid-list cols="6" rowHeight="50px" class="text-left">
      <mat-grid-tile [colspan]="5" [rowspan]="1"> {{ player.key }}</mat-grid-tile>
      <mat-grid-tile [colspan]="1" [rowspan]="2">
        <div class="spinner-container">
          <div class="spinner-background"> {{ player.value.percentage | number:'1.2-2' }} %</div>
          <mat-progress-spinner color="primary" mode="determinate" [value]="player.value.percentage">
          </mat-progress-spinner>
        </div>
      </mat-grid-tile>
      <mat-grid-tile [colspan]="1" [rowspan]="1"> Job: {{ player.value.job }}</mat-grid-tile>
      <mat-grid-tile [colspan]="1" [rowspan]="1"> Damage: {{ player.value.damage | number:'' }}</mat-grid-tile>
      <mat-grid-tile [colspan]="1" [rowspan]="1"> Skill used: {{ player.value.skill_used }}</mat-grid-tile>
      <mat-grid-tile [colspan]="1" [rowspan]="1"> Skill spam: {{ player.value.skill_spam | number:'1.2-2' }} / second</mat-grid-tile>
    </mat-grid-list>
  </div>
</mat-dialog-content>
